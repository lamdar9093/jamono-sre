server {
    listen 80;
    server_name jamono.io www.jamono.io;

    # Redirection HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name jamono.io www.jamono.io;

    ssl_certificate /etc/letsencrypt/live/jamono.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jamono.io/privkey.pem;

    # Frontend React
    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Backend API
    location /api/ {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }
}