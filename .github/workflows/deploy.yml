name: Deploy Jamono

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known hosts
        run: |
          ssh-keyscan -H jamono.io >> ~/.ssh/known_hosts

      - name: Copy files to VPS
        run: |
          rsync -avz --exclude='.git' \
            --exclude='backend/.env' \
            --exclude='backend/*.db' \
            --exclude='backend/__pycache__' \
            --exclude='backend/.venv' \
            --exclude='frontend/node_modules' \
            ./ root@jamono.io:/opt/jamono/

      - name: Deploy on VPS
        run: |
            ssh root@jamono.io << 'EOF'
            cd /opt/jamono
            
            # Créer le .env depuis les secrets
            echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" > .env
            echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" > backend/.env
            
            # Build et restart
            docker compose -f docker-compose.prod.yml build --no-cache
            docker compose -f docker-compose.prod.yml up -d
            docker compose -f docker-compose.prod.yml restart nginx
            docker image prune -f
            
            echo "✅ Déploiement terminé"
            EOF

      - name: Health check
        run: |
          for i in $(seq 1 10); do
            echo "Attempt $i/10..."
            if curl -sf https://jamono.io/api/health; then
              echo "Health check passed"
              exit 0
            fi
            sleep 10
          done
          echo "Health check failed after 10 attempts"
          exit 1