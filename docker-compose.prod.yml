version: "3.9"

services:backend:
  build:
    context: .
    dockerfile: docker/backend.Dockerfile
  container_name: jamono-backend
  restart: always
  environment:
    - OPENAI_API_KEY=${OPENAI_API_KEY}
  networks:
    - jamono-net
  volumes:
    - jamono-data:/app/data

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: jamono-frontend
    restart: always
    networks:
      - jamono-net

  nginx:
    image: nginx:alpine
    container_name: jamono-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/jamono.conf:/etc/nginx/conf.d/jamono.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
      - frontend
    networks:
      - jamono-net

volumes:
  jamono-data:

networks:
  jamono-net:
    driver: bridge