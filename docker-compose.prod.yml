version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: jamono-db
    restart: always
    environment:
      POSTGRES_USER: jamono
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: jamono
    volumes:
      - jamono-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jamono"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - jamono-net

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: jamono-backend
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://jamono:${POSTGRES_PASSWORD}@postgres:5432/jamono
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
    networks:
      - jamono-net
      - traefik-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.jamono-backend.rule=(Host(`jamono.io`) || Host(`www.jamono.io`)) && PathPrefix(`/api/`)"
      - "traefik.http.routers.jamono-backend.entrypoints=websecure"
      - "traefik.http.routers.jamono-backend.tls.certresolver=letsencrypt"
      - "traefik.http.routers.jamono-backend.middlewares=jamono-strip-api"
      - "traefik.http.middlewares.jamono-strip-api.stripprefix.prefixes=/api"
      - "traefik.http.services.jamono-backend.loadbalancer.server.port=8000"

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: jamono-frontend
    restart: always
    networks:
      - jamono-net
      - traefik-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.jamono-frontend.rule=(Host(`jamono.io`) || Host(`www.jamono.io`)) && !PathPrefix(`/api/`)"
      - "traefik.http.routers.jamono-frontend.entrypoints=websecure"
      - "traefik.http.routers.jamono-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.jamono-frontend.loadbalancer.server.port=80"


volumes:
  jamono-pgdata:

networks:
  jamono-net:
    driver: bridge
  traefik-net:
    external: true
    name: traefik-net