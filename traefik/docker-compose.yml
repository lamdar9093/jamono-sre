# Traefik - reverse proxy partagé entre jamono.io et gobering.com
# Déployé UNE SEULE FOIS manuellement sur le VPS dans /opt/traefik/
# NON déployé par le pipeline CI/CD de jamono-sre

services:
  traefik:
    image: traefik:v3.2
    container_name: traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik.yml:/traefik.yml:ro
      - traefik-certs:/etc/traefik/acme
    networks:
      - traefik-net

volumes:
  traefik-certs:

networks:
  traefik-net:
    external: true
    name: traefik-net
